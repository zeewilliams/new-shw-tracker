<html lang="en">
<head>

<style>
:root {
  --gold:      #D4AF37;
  --gold-dim:  #B8960B;
  --gold-glow: rgba(212,175,55,0.25);
  --green:     #22C55E;
  --green-dim: rgba(34,197,94,0.15);
  --blue:      #60A5FA;
  --blue-dim:  rgba(96,165,250,0.15);
  --amber:     #FBBF24;
  --amber-dim: rgba(251,191,36,0.15);
  --red:       #F87171;
  --red-dim:   rgba(248,113,113,0.15);
  --white:     rgba(255,255,255,0.92);
  --muted:     rgba(255,255,255,0.5);
  --faint:     rgba(255,255,255,0.25);
  --glass:     rgba(255,255,255,0.07);
  --glass-md:  rgba(255,255,255,0.11);
  --glass-hv:  rgba(255,255,255,0.14);
  --border:    rgba(255,255,255,0.12);
  --border-md: rgba(255,255,255,0.2);
  --blur:      blur(20px) saturate(180%);
  --blur-sm:   blur(12px) saturate(160%);
  --r:         14px;
  --r-sm:      10px;
  --r-pill:    999px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; background: #0A0A1A; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  min-height: 100dvh;
  background: #080818;
  color: var(--white);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  position: relative;
  overflow-x: hidden;
}

/* ── ANIMATED BACKGROUND ORBS ── */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.55;
  animation: drift linear infinite;
}
.orb-1 {
  width: 360px; height: 360px;
  background: radial-gradient(circle, rgba(212,175,55,0.6), transparent 70%);
  top: -100px; left: -80px;
  animation-duration: 18s;
}
.orb-2 {
  width: 420px; height: 420px;
  background: radial-gradient(circle, rgba(139,92,246,0.5), transparent 70%);
  top: 30%; right: -120px;
  animation-duration: 22s;
  animation-delay: -8s;
}
.orb-3 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(56,189,248,0.4), transparent 70%);
  bottom: 10%; left: 10%;
  animation-duration: 26s;
  animation-delay: -14s;
}
@keyframes drift {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(40px,-30px) scale(1.08); }
  66%      { transform: translate(-30px,40px) scale(0.95); }
}

/* ── LAYOUT ── */
.app { position: relative; z-index: 1; }

/* ── HEADER ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding-top: env(safe-area-inset-top);
  background: rgba(10,10,26,0.7);
  -webkit-backdrop-filter: var(--blur);
  backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-monogram {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 18px;
  font-weight: 700;
  color: #0A0A1A;
  flex-shrink: 0;
}
.header-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.01em;
  line-height: 1.1;
}
.header-sub {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.04em;
}
.overview-btn {
  background: var(--glass);
  -webkit-backdrop-filter: var(--blur-sm);
  backdrop-filter: var(--blur-sm);
  border: 1px solid var(--border-md);
  border-radius: var(--r-pill);
  color: var(--gold);
  font-size: 13px;
  font-weight: 500;
  padding: 8px 16px;
  cursor: pointer;
  font-family: inherit;
  min-height: 36px;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, box-shadow 0.15s;
}
.overview-btn:active {
  background: var(--glass-md);
  box-shadow: 0 0 16px var(--gold-glow);
}

/* ── STATS ── */
.stats-wrap {
  padding: 14px 16px 0;
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 8px;
}
.stat-card {
  background: var(--glass);
  -webkit-backdrop-filter: var(--blur-sm);
  backdrop-filter: var(--blur-sm);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 8px;
  text-align: center;
}
.stat-v {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.2;
  color: var(--white);
}
.stat-v.gold  { color: var(--gold); }
.stat-v.green { color: var(--green); }
.stat-v.red   { color: var(--red); }
.stat-v.blue  { color: var(--blue); }
.stat-l {
  font-size: 9px;
  color: var(--muted);
  margin-top: 3px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.stat-tap {
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, transform 0.1s;
}
.stat-tap:active {
  background: var(--glass-hv);
  transform: scale(0.96);
}

/* ── PROGRESS ── */
.prog-wrap {
  padding: 12px 16px;
}
.prog-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 6px;
}
.track {
  height: 6px;
  background: var(--glass-md);
  border-radius: 3px;
  overflow: hidden;
}
.track-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 10px var(--gold-glow);
}

/* ── DEADLINE ── */
.deadline-wrap {
  margin: 0 16px 4px;
  background: rgba(212,175,55,0.08);
  -webkit-backdrop-filter: var(--blur-sm);
  backdrop-filter: var(--blur-sm);
  border: 1px solid rgba(212,175,55,0.25);
  border-radius: var(--r-sm);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.deadline-lbl {
  font-size: 12px;
  font-weight: 500;
  color: var(--gold);
  white-space: nowrap;
}
.deadline-input {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: var(--r-sm);
  color: var(--white);
  font-size: 13px;
  font-family: inherit;
  padding: 5px 10px;
  max-width: 150px;
  -webkit-appearance: none;
  color-scheme: dark;
}
.deadline-input:focus { outline: none; border-color: var(--gold); }
.countdown-badge {
  font-size: 11px;
  font-weight: 600;
  color: var(--amber);
  background: var(--amber-dim);
  border: 1px solid rgba(251,191,36,0.3);
  border-radius: var(--r-pill);
  padding: 3px 9px;
  white-space: nowrap;
}

/* ── CONTENT ── */
.content {
  padding: 8px 16px calc(env(safe-area-inset-bottom) + 88px);
}

/* ── SECTION HEADS ── */
.sec-head {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 5px 10px;
  border-radius: var(--r-pill);
  margin: 14px 0 8px;
}
.sec-head:first-child { margin-top: 4px; }
.sh-green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
.sh-blue  { background: var(--blue-dim);  color: var(--blue);  border: 1px solid rgba(96,165,250,0.2); }
.sh-amber { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
.sh-red   { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(248,113,113,0.2); }
.sh-gray  { background: var(--glass);     color: var(--muted); border: 1px solid var(--border); }
.sec-ct { margin-left: auto; opacity: 0.7; }

/* ── PERSON CARD ── */
.pcard {
  background: var(--glass);
  -webkit-backdrop-filter: var(--blur-sm);
  backdrop-filter: var(--blur-sm);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px;
  margin-bottom: 8px;
  transition: border-color 0.2s;
  position: relative;
  overflow: hidden;
}
.pcard::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
  background: var(--card-accent, transparent);
}
.pcard-green { --card-accent: var(--green); border-color: rgba(34,197,94,0.2); }
.pcard-blue  { --card-accent: var(--blue);  border-color: rgba(96,165,250,0.2); }
.pcard-amber { --card-accent: var(--amber); border-color: rgba(251,191,36,0.2); }
.pcard-red   { --card-accent: var(--red);   border-color: rgba(248,113,113,0.2); }

.ptop { display: flex; align-items: center; gap: 10px; }
.av {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; flex-shrink: 0;
}
.av-g  { background: rgba(34,197,94,0.2);  color: var(--green); }
.av-b  { background: rgba(96,165,250,0.2); color: var(--blue); }
.av-gl { background: rgba(212,175,55,0.2); color: var(--gold); }
.av-d  { background: var(--glass-md); color: var(--muted); }

.pinfo { flex: 1; min-width: 0; }
.pname {
  font-size: 14px; font-weight: 500; color: var(--white);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.psub { font-size: 11px; color: var(--muted); margin-top: 2px; }

.badge {
  font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: var(--r-pill);
  white-space: nowrap; flex-shrink: 0;
  border: 1px solid;
}
.bg-green { background: var(--green-dim); color: var(--green); border-color: rgba(34,197,94,0.3); }
.bg-blue  { background: var(--blue-dim);  color: var(--blue);  border-color: rgba(96,165,250,0.3); }
.bg-amber { background: var(--amber-dim); color: var(--amber); border-color: rgba(251,191,36,0.3); }
.bg-red   { background: var(--red-dim);   color: var(--red);   border-color: rgba(248,113,113,0.3); }
.bg-gray  { background: var(--glass);     color: var(--muted); border-color: var(--border); }

/* mini progress */
.mini-track {
  height: 3px;
  background: var(--glass-md);
  border-radius: 2px;
  overflow: hidden;
  margin: 9px 0 0;
}
.mini-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--blue-dim), var(--blue));
  transition: width 0.3s;
  box-shadow: 0 0 6px rgba(96,165,250,0.4);
}

/* ── BUTTONS ── */
.btn-row { display: flex; gap: 8px; margin-top: 12px; }
.btn {
  flex: 1;
  min-height: 44px;
  border-radius: var(--r-sm);
  font-size: 13px; font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  border: 1px solid;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.15s, box-shadow 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.btn:active { opacity: 0.7; }
.btn-paid {
  background: rgba(34,197,94,0.15);
  color: var(--green);
  border-color: rgba(34,197,94,0.3);
}
.btn-paid:active { box-shadow: 0 0 14px rgba(34,197,94,0.3); }
.btn-partial {
  background: var(--glass);
  color: var(--white);
  border-color: var(--border-md);
}
.btn-undo {
  flex: 0 0 auto; padding: 0 14px;
  background: var(--glass);
  color: var(--muted);
  border-color: var(--border);
  font-size: 12px;
}

/* partial input */
.partial-wrap {
  margin-top: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px;
}
.partial-lbl { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.partial-row { display: flex; gap: 8px; align-items: center; }
.dollar { font-size: 16px; color: var(--muted); }
.partial-inp {
  flex: 1; height: 44px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border-md);
  border-radius: var(--r-sm);
  color: var(--white);
  font-size: 16px; font-family: inherit;
  padding: 0 12px;
  -webkit-appearance: none;
}
.partial-inp:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(96,165,250,0.15); }
.btn-apply {
  height: 44px; padding: 0 18px;
  background: rgba(96,165,250,0.2);
  color: var(--blue);
  border: 1px solid rgba(96,165,250,0.35);
  border-radius: var(--r-sm);
  font-size: 13px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.btn-apply:active { opacity: 0.7; }
.btn-x {
  height: 44px; padding: 0 10px;
  background: none; border: none;
  color: var(--muted); font-size: 16px; cursor: pointer;
}

/* ── COPY FOOTER ── */
.copy-footer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 99;
  padding: 12px 16px calc(env(safe-area-inset-bottom) + 12px);
  background: rgba(10,10,26,0.75);
  -webkit-backdrop-filter: var(--blur);
  backdrop-filter: var(--blur);
  border-top: 1px solid var(--border);
}
.copy-btn {
  width: 100%; height: 52px;
  background: linear-gradient(135deg, rgba(212,175,55,0.25), rgba(212,175,55,0.12));
  border: 1px solid rgba(212,175,55,0.5);
  border-radius: var(--r);
  color: var(--gold);
  font-size: 15px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  -webkit-tap-highlight-color: transparent;
  transition: box-shadow 0.2s, background 0.2s;
  letter-spacing: -0.1px;
}
.copy-btn:active { box-shadow: 0 0 30px var(--gold-glow); }
.copy-btn.copied {
  background: linear-gradient(135deg, rgba(34,197,94,0.25), rgba(34,197,94,0.12));
  border-color: rgba(34,197,94,0.5);
  color: var(--green);
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.6);
  display: none; align-items: flex-end;
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
}
.modal-overlay.open { display: flex; }
.modal {
  width: 100%;
  max-height: 88dvh;
  overflow-y: auto;
  background: rgba(15,15,35,0.92);
  -webkit-backdrop-filter: var(--blur);
  backdrop-filter: var(--blur);
  border: 1px solid var(--border-md);
  border-radius: 24px 24px 0 0;
  padding-bottom: calc(env(safe-area-inset-bottom) + 24px);
  animation: slideUp 0.32s cubic-bezier(0.34,1.3,0.64,1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: var(--glass-hv); border-radius: 2px; margin: 14px auto 0; }
.modal-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 14px;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 20px; font-weight: 600; color: var(--gold);
}
.modal-close {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--glass-md); border: 1px solid var(--border);
  color: var(--muted); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.modal-body { padding: 18px 20px; }

/* overview sections */
.ov-sec { margin-bottom: 20px; }
.ov-sec-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
}
.ov-big {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.ov-big-lbl { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.ov-big-val { font-size: 24px; font-weight: 600; }
.ov-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 0; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.ov-row:last-child { border-bottom: none; }
.ov-lbl { color: var(--muted); }
.ov-val { font-weight: 600; color: var(--white); }
.ov-val.green { color: var(--green); }
.ov-val.red   { color: var(--red); }
.ov-val.blue  { color: var(--blue); }
.ov-val.amber { color: var(--amber); }
.ov-val.gold  { color: var(--gold); }

/* ── TOAST ── */
.toast {
  position: fixed; z-index: 300;
  bottom: calc(env(safe-area-inset-bottom) + 96px);
  left: 50%; transform: translateX(-50%) translateY(12px);
  background: rgba(30,30,50,0.95);
  -webkit-backdrop-filter: var(--blur-sm);
  backdrop-filter: var(--blur-sm);
  border: 1px solid var(--border-md);
  color: var(--white); padding: 10px 20px;
  border-radius: var(--r-pill); font-size: 13px; font-weight: 500;
  opacity: 0; transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="header-monogram">S</div>
        <div>
          <div class="header-title">SHW Legacy</div>
          <div class="header-sub">Stewart · Hicks · Williams · 2026</div>
        </div>
      </div>
      <button class="overview-btn" onclick="openOv()">Overview</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-wrap">
    <div class="stat-card stat-tap" onclick="showStatDetail('collected')"><div class="stat-v green" id="s-col">$0</div><div class="stat-l">Collected ›</div></div>
    <div class="stat-card stat-tap" onclick="showStatDetail('inhand')"><div class="stat-v blue"  id="s-hand">$0</div><div class="stat-l">In hand ›</div></div>
    <div class="stat-card stat-tap" onclick="showStatDetail('shortfall')"><div class="stat-v red"   id="s-short">$0</div><div class="stat-l">Shortfall ›</div></div>
    <div class="stat-card stat-tap" onclick="showStatDetail('fullpaid')"><div class="stat-v gold"  id="s-full">0/20</div><div class="stat-l">Fully paid ›</div></div>
  </div>

  <!-- PROGRESS -->
  <div class="prog-wrap">
    <div class="prog-row"><span>Collection progress</span><span id="prog-pct">0%</span></div>
    <div class="track"><div class="track-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <!-- DEADLINE -->
  <div class="deadline-wrap">
    <div class="deadline-lbl">⏰ Deadline</div>
    <input class="deadline-input" type="date" id="deadline" value="2026-09-25" onchange="onDL()">
    <div class="countdown-badge" id="cdown"></div>
  </div>

  <!-- PEOPLE -->

<script>
const DEPOSITS=1076.66,HOUSE_TOT=5383.23,HOUSE_OWD=4306.57,MAX_FULL=5420,LS='shw_glass_v1';

const PP=[
  {id:'martinJr', f:'Martin Jr', n:'Martin Jr + Amari',              g:1,b:270,full:270},
  {id:'etrinity', f:'Etrinity',  n:'Etrinity Stewart + Demarious',   g:1,b:270,full:270},
  {id:'zephaniah',f:'Zephaniah', n:'Zephaniah + Zee + Nova',         g:1,b:270,full:270},
  {id:'ayshiona', f:'Ayshiona',  n:"Ayshiona + Ti'Yanna",            g:1,b:270,full:270},
  {id:'terrence', f:'Terrence',  n:'Terrence Stewart + partner',     g:1,b:270,full:270},
  {id:'mary',     f:'Mary',      n:'Mary Stewart',                   g:0,b:270,full:270},
  {id:'latavia',  f:'Latavia',   n:'Latavia',                        g:0,b:270,full:270},
  {id:'david',    f:'David',     n:'David Hicks',                    g:0,b:270,full:270},
  {id:'adrian',   f:'Adrian',    n:'Adrian Hicks',                   g:0,b:290,full:290,note:'incl. $20 reserve'},
  {id:'ravaughn', f:'Ravaughn',  n:'Ravaughn',                       g:0,b:155,full:270,note:'Phase 1 + $20 reserve'},
  {id:'aaron',    f:'Aaron',     n:'Aaron Hicks Jr + Darion + Aaron',g:1,b:135,full:270},
  {id:'tarra',    f:'Tarra',     n:'Tarra + Kiley + Kiyonn',         g:1,b:135,full:270},
  {id:'malachi',  f:'Malachi',   n:'Malachi + Jaylen',               g:1,b:135,full:270},
  {id:'terrencia',f:'Terrencia', n:'Terrencia + Sayori',             g:1,b:135,full:270},
  {id:'jasmine',  f:'Jasmine',   n:'Jasmine Williams + partner',     g:1,b:135,full:270},
  {id:'martinea', f:'Martinea',  n:'Martinea Hicks',                 g:0,b:135,full:270},
  {id:'helena',   f:'Helena',    n:'Helena + Kiyan',                 g:1,b:30, full:270,note:'$30 reserve'},
  {id:'jonathan', f:'Jonathan',  n:'Jonathan',                       g:0,b:20, full:270,note:'$20 reserve'},
  {id:'makayla',  f:'Makayla',   n:'Makayla',                        g:0,b:0,  full:270},
  {id:'marquise', f:'Marquise',  n:'Marquise',                       g:0,b:0,  full:270},
  {id:'imari',    f:"I'Mari",    n:"I'Mari",                         g:0,b:null,full:0,teen:1},
];

let S={},PO=null;

function ini(n){return n.split(' ').filter(w=>w&&w!=='+').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function fm(n){return '$'+parseFloat(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fms(n){return '$'+Math.round(n).toLocaleString('en-US');}

function load(){
  try{
    const d=JSON.parse(localStorage.getItem(LS)||'{}');
    PP.forEach(p=>{S[p.id]=(p.id in d)?d[p.id]:p.b;});
    if(d._dl)document.getElementById('deadline').value=d._dl;
  }catch(e){PP.forEach(p=>{S[p.id]=p.b;});}
}
function save(){
  try{localStorage.setItem(LS,JSON.stringify({...S,_dl:document.getElementById('deadline').value}));}catch(e){}
}

function totalCol(){return PP.filter(p=>!p.teen).reduce((s,p)=>s+(S[p.id]||0),0);}

function upStats(){
  const col=totalCol(),hand=Math.max(col-DEPOSITS,0),short=Math.max(HOUSE_OWD-hand,0);
  const fp=PP.filter(p=>!p.teen&&(S[p.id]||0)>=p.full).length,pct=Math.min(col/MAX_FULL*100,100);
  document.getElementById('s-col').textContent=fms(col);
  document.getElementById('s-hand').textContent=fms(hand);
  document.getElementById('s-short').textContent=fms(short);
  document.getElementById('s-full').textContent=fp+'/20';
  document.getElementById('prog-fill').style.width=pct.toFixed(1)+'%';
  document.getElementById('prog-pct').textContent=pct.toFixed(1)+'%';
  upCD();
}

function upCD(){
  const v=document.getElementById('deadline').value,el=document.getElementById('cdown');
  if(!v){el.textContent='';return;}
  const d=Math.ceil((new Date(v+'T00:00:00')-new Date())/(864e5));
  el.textContent=d<0?'Past due':d===0?'Due today':d===1?'1 day left':d+' days left';
}

function onDL(){save();upStats();}

function markPaid(id){
  const p=PP.find(x=>x.id===id);S[id]=p.full;PO=null;save();render();toast(p.f+' marked fully paid ✓');}
function undo(id){
  const p=PP.find(x=>x.id===id);S[id]=p.b;save();render();toast('Payment reset for '+p.f);}
function togPart(id){
  PO=PO===id?null:id;render();
  if(PO)setTimeout(()=>{const i=document.getElementById('pi_'+id);if(i){i.focus();i.select();}},80);
}
function applyPart(id){
  const i=document.getElementById('pi_'+id),v=parseFloat(i.value);
  if(isNaN(v)||v<=0){i.style.borderColor='var(--red)';return;}
  const p=PP.find(x=>x.id===id),prev=S[id]||0;
  S[id]=parseFloat(Math.min(prev+v,p.full).toFixed(2));
  PO=null;save();render();
  const ow=p.full-S[id];
  toast(ow<=0?p.f+' is now fully paid ✓':fm(v)+' added · '+fm(ow)+' remaining');
}

function render(){
  const paid=PP.filter(p=>!p.teen&&(S[p.id]||0)>=p.full);
  const part=PP.filter(p=>!p.teen&&(S[p.id]||0)>0&&(S[p.id]||0)<p.full);
  const zero=PP.filter(p=>!p.teen&&(S[p.id]||0)===0);
  const teen=PP.filter(p=>p.teen);

  let h='';

  if(paid.length){
    h+=`<div class="sec-head sh-green">✓ Fully paid<span class="sec-ct">${paid.length}</span></div>`;
    paid.forEach(p=>{
      const amt=S[p.id],lbl=amt>270?fm(amt)+' · incl. reserve':fm(amt);
      h+=`<div class="pcard pcard-green">
        <div class="ptop">
          <div class="av av-g">${ini(p.n)}</div>
          <div class="pinfo"><div class="pname">${p.n}</div>${p.note?`<div class="psub">${p.note}</div>`:''}</div>
          <span class="badge bg-green">${lbl}</span>
        </div>
        <div class="btn-row"><button class="btn btn-undo" onclick="undo('${p.id}')">↩ Undo</button></div>
      </div>`;
    });
  }

  if(part.length){
    h+=`<div class="sec-head sh-blue">● Balance remaining<span class="sec-ct">${part.length}</span></div>`;
    part.forEach(p=>{
      const pd=S[p.id]||0,ow=p.full-pd,pct=(pd/p.full*100).toFixed(0),op=PO===p.id;
      h+=`<div class="pcard pcard-blue">
        <div class="ptop">
          <div class="av av-b">${ini(p.n)}</div>
          <div class="pinfo"><div class="pname">${p.n}</div><div class="psub">paid ${fm(pd)} · owes ${fm(ow)}</div></div>
          <span class="badge bg-blue">${fm(ow)} left</span>
        </div>
        <div class="mini-track"><div class="mini-fill" style="width:${pct}%"></div></div>
        <div class="btn-row">
          <button class="btn btn-paid" onclick="markPaid('${p.id}')">✓ Mark fully paid</button>
          <button class="btn btn-partial" onclick="togPart('${p.id}')">${op?'Cancel':'+ Add payment'}</button>
        </div>
        ${op?`<div class="partial-wrap"><div class="partial-lbl">How much did they pay?</div>
          <div class="partial-row">
            <span class="dollar">$</span>
            <input class="partial-inp" id="pi_${p.id}" type="number" inputmode="decimal" min="1" max="${ow}" step="1" placeholder="e.g. 50">
            <button class="btn-apply" onclick="applyPart('${p.id}')">Apply</button>
            <button class="btn-x" onclick="togPart('${p.id}')">✕</button>
          </div></div>`:''}
      </div>`;
    });
  }

  if(zero.length){
    h+=`<div class="sec-head sh-red">✕ No payment yet<span class="sec-ct">${zero.length}</span></div>`;
    zero.forEach(p=>{
      const op=PO===p.id;
      h+=`<div class="pcard pcard-red">
        <div class="ptop">
          <div class="av av-d">${ini(p.n)}</div>
          <div class="pinfo"><div class="pname">${p.n}</div><div class="psub">$270.00 remaining</div></div>
          <span class="badge bg-red">$270 left</span>
        </div>
        <div class="btn-row">
          <button class="btn btn-paid" onclick="markPaid('${p.id}')">✓ Mark fully paid</button>
          <button class="btn btn-partial" onclick="togPart('${p.id}')">${op?'Cancel':'+ Add payment'}</button>
        </div>
        ${op?`<div class="partial-wrap"><div class="partial-lbl">How much did they pay?</div>
          <div class="partial-row">
            <span class="dollar">$</span>
            <input class="partial-inp" id="pi_${p.id}" type="number" inputmode="decimal" min="1" max="270" step="1" placeholder="e.g. 50">
            <button class="btn-apply" onclick="applyPart('${p.id}')">Apply</button>
            <button class="btn-x" onclick="togPart('${p.id}')">✕</button>
          </div></div>`:''}
      </div>`;
    });
  }

  h+=`<div class="sec-head sh-gray">Teenager · not contributing</div>`;
  teen.forEach(p=>{
    h+=`<div class="pcard"><div class="ptop">
      <div class="av av-d">${ini(p.n)}</div>
      <div class="pinfo"><div class="pname">${p.n}</div></div>
      <span class="badge bg-gray">n/a</span>
    </div></div>`;
  });

  document.getElementById('content').innerHTML=h;
  upStats();
}

// OVERVIEW
function openOv(){
  const col=totalCol(),hand=Math.max(col-DEPOSITS,0),short=Math.max(HOUSE_OWD-hand,0);
  const fp=PP.filter(p=>!p.teen&&(S[p.id]||0)>=p.full).length;
  const pt=PP.filter(p=>!p.teen&&(S[p.id]||0)>0&&(S[p.id]||0)<p.full).length;
  const np=PP.filter(p=>!p.teen&&(S[p.id]||0)===0).length;
  const ow=PP.filter(p=>!p.teen).reduce((s,p)=>s+Math.max(p.full-(S[p.id]||0),0),0);
  const pct=(col/MAX_FULL*100).toFixed(1);
  const dl=document.getElementById('deadline').value;
  const dlf=dl?new Date(dl+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'—';
  const dd=dl?Math.ceil((new Date(dl+'T00:00:00')-new Date())/864e5):null;

      <div class="ov-row"><span class="ov-lbl">Shortfall right now</span><span class="ov-val red">${fm(short)}</span></div>
    </div>
    <div class="ov-sec">
      <div class="ov-sec-title">People</div>
      <div class="ov-row"><span class="ov-lbl">Fully paid</span><span class="ov-val green">${fp} of 20</span></div>
      <div class="ov-row"><span class="ov-lbl">Partial payment</span><span class="ov-val blue">${pt} people</span></div>
      <div class="ov-row"><span class="ov-lbl">No payment yet</span><span class="ov-val red">${np} people</span></div>
      <div class="ov-row"><span class="ov-lbl">Total still owed</span><span class="ov-val amber">${fm(ow)}</span></div>
    </div>
    <div class="ov-sec">
      <div class="ov-sec-title">If everyone pays in full</div>
      <div class="ov-row"><span class="ov-lbl">Total collected</span><span class="ov-val">${fm(MAX_FULL)}</span></div>
      <div class="ov-row"><span class="ov-lbl">Total house cost</span><span class="ov-val">${fm(HOUSE_TOT)}</span></div>
      <div class="ov-row"><span class="ov-lbl">Surplus</span><span class="ov-val green">$36.77</span></div>
    </div>
    <div class="ov-sec">
      <div class="ov-sec-title">Deadline</div>
      <div class="ov-row"><span class="ov-lbl">Payment due by</span><span class="ov-val gold">${dlf}</span></div>
      ${dds?`<div class="ov-row"><span class="ov-lbl">Time remaining</span><span class="ov-val amber">${dds}</span></div>`:''}

  document.getElementById('ov-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeOv(){document.getElementById('ov-overlay').classList.remove('open');document.body.style.overflow='';}
function closeOvOutside(e){if(e.target===document.getElementById('ov-overlay'))closeOv();}

// COPY
function doCopy(){
  const wb=PP.filter(p=>!p.teen&&(S[p.id]||0)<p.full);
  const pt=wb.filter(p=>(S[p.id]||0)>0),zr=wb.filter(p=>(S[p.id]||0)===0);
  const dl=document.getElementById('deadline').value;
  const dlf=dl?new Date(dl+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'';
  const dd=dl?Math.ceil((new Date(dl+'T00:00:00')-new Date())/864e5):null;
  const dds=dd!==null?(dd<0?'past due':dd===0?'due today':dd===1?'1 day left':dd+' days left'):'';

  let msg=`SHW Legacy Reunion 2026 — Balance Reminder\n━━━━━━━━━━━━━━━━━━━━━\n`;
  if(dlf)msg+=`⏰ Payment deadline: ${dlf}${dds?' · '+dds:''}\n`;
  msg+=`\n`;
  if(pt.length){
    msg+=`🔵 Balance remaining:\n`;
    pt.forEach(p=>{const ow=p.full-(S[p.id]||0);msg+=`${p.g?'👥':'🧍'}  ${p.f} — ${fm(ow)} still owed\n`;});
    msg+=`\n`;
  }
  if(zr.length){
    msg+=`❌ No payment yet:\n`;
    zr.forEach(p=>{msg+=`${p.g?'👥':'🧍'}  ${p.f} — ${fm(p.full)} still owed\n`;});
    msg+=`\n`;
  }
  msg+=`━━━━━━━━━━━━━━━━━━━━━\n💳 Payment methods: Zelle · Apple Pay · Cash App · Cash\n`;
  if(dlf)msg+=`📅 ${dds?dds.charAt(0).toUpperCase()+dds.slice(1)+' — please':'Please'} send your payment before ${dlf}\nStewart · Hicks · Williams · 2026 🙏`;

  navigator.clipboard.writeText(msg).then(done).catch(()=>{
    const t=document.createElement('textarea');t.value=msg;t.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(t);t.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(t);done();
  });
  function done(){
    const b=document.getElementById('copyBtn');
    b.textContent='✓ Copied! Paste into your text';b.classList.add('copied');
    setTimeout(()=>{b.textContent='📋 Copy payment reminder';b.classList.remove('copied');},3000);
  }
}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ── STAT DETAIL POPUPS ──

        <div class="ov-row"><span class="ov-lbl">Shortfall right now</span><span class="ov-val red">${fm(short)}</span></div>
        <div class="ov-row" style="border-top:1px solid var(--border-md);margin-top:4px;padding-top:12px"><span class="ov-lbl">Surplus when all pay</span><span class="ov-val green">${fm(Math.max(stillOwed-short,0)+36.77)}</span></div>
        <p style="font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5">
          If everyone pays their full share, the shortfall is covered and we end with a $36.77 surplus.
        </p>
      </div>`;
  }

  else if(type==='fullpaid'){
    title='Fully paid';
    body=`
      <div class="ov-sec">
        <div class="ov-sec-title">Payment status</div>
        <div class="ov-big">
          <div><div class="ov-big-lbl">Fully paid</div><div class="ov-big-val green">${fp.length} of 20</div></div>
          <div style="text-align:right"><div class="ov-big-lbl">Still owed</div><div class="ov-big-val red">${20-fp.length} people</div></div>
        </div>
        <div class="ov-row"><span class="ov-lbl">Fully paid</span><span class="ov-val green">${fp.length}</span></div>
        <div class="ov-row"><span class="ov-lbl">Partial payment</span><span class="ov-val blue">${pt.length}</span></div>
        <div class="ov-row"><span class="ov-lbl">No payment</span><span class="ov-val red">${zr.length}</span></div>
      </div>
      <div class="ov-sec">
        <div class="ov-sec-title">Fully paid people (${fp.length})</div>
        ${fp.map(p=>`<div class="ov-row"><span class="ov-lbl">${p.n}</span><span class="ov-val green">${fm(S[p.id]||0)}</span></div>`).join('')}
      </div>
      ${pt.length?`<div class="ov-sec">
        <div class="ov-sec-title">Balance remaining (${pt.length})</div>
        ${pt.map(p=>`<div class="ov-row"><span class="ov-lbl">${p.f}</span><span class="ov-val blue">${fm(p.full-(S[p.id]||0))} left</span></div>`).join('')}
      </div>`:''}
      ${zr.length?`<div class="ov-sec">
        <div class="ov-sec-title">No payment yet (${zr.length})</div>
        ${zr.map(p=>`<div class="ov-row"><span class="ov-lbl">${p.f}</span><span class="ov-val red">${fm(p.full)} owed</span></div>`).join('')}
      </div>`:''}`;
  }

  document.getElementById('stat-title').textContent=title;
  document.getElementById('stat-body').innerHTML=body;
  document.getElementById('stat-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeStat(){document.getElementById('stat-overlay').classList.remove('open');document.body.style.overflow='';}
function closeStatIfOutside(e){if(e.target===document.getElementById('stat-overlay'))closeStat();}

// ── REAL-TIME PERSISTENCE for iOS ──
// Save when tab goes to background (switching apps on iPhone)
document.addEventListener('visibilitychange',()=>{if(document.hidden)save();});
// pagehide fires on iOS Safari when you leave the page
window.addEventListener('pagehide',()=>save());
// pageshow fires when returning from bfcache on iOS
window.addEventListener('pageshow',(e)=>{if(e.persisted){load();render();upStats();}});
// Also save every 10 seconds as a safety net
setInterval(save,10000);

load();render();upStats();
setInterval(upCD,60000);
</script>
</body>
</html>
